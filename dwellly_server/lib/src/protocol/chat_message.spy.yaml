class: ChatMessage
table: chat_message
fields:
  senderId: int
  sender: User?, relation(name=sender_messages, field=senderId)
  receiverId: int
  receiver: User?, relation(name=receiver_messages, field=receiverId)
  message: String
  messageType: String, default="text"
  attachmentUrl: String?
  attachmentDuration: int?
  attachmentName: String?
  attachmentSize: int?
  sentAt: DateTime
  isRead: bool
